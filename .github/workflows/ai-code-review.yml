name: AI Code Review

on:
  pull_request:

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Fetch base branch
        run: git fetch origin ${{ github.base_ref }}

      - name: Post PR summary
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { execSync } = require('child_process');
            
            let diff = '';
            try {
              diff = execSync('git diff origin/${{ github.base_ref }}...HEAD -- "*.ts" "*.tsx" "*.js" "*.jsx" "*.css"', { encoding: 'utf8', maxBuffer: 1024 * 1024 });
            } catch (e) {
              console.log('Error getting diff:', e.message);
              return;
            }
            
            if (!diff.trim()) {
              console.log('No code changes');
              return;
            }
            
            const lines = diff.split('\n');
            const added = lines.filter(l => l.startsWith('+') && !l.startsWith('+++')).length;
            const removed = lines.filter(l => l.startsWith('-') && !l.startsWith('---')).length;
            const files = lines.filter(l => l.startsWith('diff --git')).length;
            
            const truncatedDiff = diff.length > 5000 ? diff.substring(0, 5000) + '\n... (truncated)' : diff;
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## 📝 PR 變更摘要\n\n| 項目 | 數量 |\n|------|------|\n| 📁 變更檔案 | ${files} |\n| ➕ 新增行數 | ${added} |\n| ➖ 刪除行數 | ${removed} |\n\n<details>\n<summary>📄 查看變更內容</summary>\n\n\`\`\`diff\n${truncatedDiff}\n\`\`\`\n\n</details>\n\n---\n*請人工審查後合併*`
            });
