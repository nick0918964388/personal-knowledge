name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Get PR diff
        id: diff
        run: |
          # Get the diff
          DIFF=$(git diff origin/${{ github.base_ref }}...HEAD -- '*.ts' '*.tsx' '*.js' '*.jsx' '*.css' | head -c 8000 || true)
          # Save to file to avoid escaping issues
          echo "$DIFF" > /tmp/diff.txt
          echo "has_diff=$([[ -s /tmp/diff.txt ]] && echo 'true' || echo 'false')" >> $GITHUB_OUTPUT
      
      - name: AI Code Review
        if: steps.diff.outputs.has_diff == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const diff = fs.readFileSync('/tmp/diff.txt', 'utf8');
            
            if (!diff.trim()) {
              console.log('No code changes to review');
              return;
            }
            
            const prompt = `你是一位資深的 Code Reviewer。請審查以下程式碼變更，用繁體中文回覆。

重點檢查：
1. 潛在的 bug 或錯誤
2. 效能問題
3. 安全性問題
4. 程式碼品質和可讀性
5. 最佳實踐建議

請用以下格式回覆：
## 🔍 Code Review 摘要
（簡短總結這次變更）

## ✅ 優點
（列出做得好的地方）

## ⚠️ 需要注意
（列出潛在問題或建議，如果沒有就寫「看起來不錯！」）

## 💡 建議
（改進建議，如果沒有就省略此段）

---
程式碼變更：
\`\`\`diff
${diff}
\`\`\``;

            // Use GitHub Copilot API (available in GitHub Actions)
            try {
              const response = await fetch('https://api.githubcopilot.com/chat/completions', {
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                  'Authorization': `Bearer ${{ secrets.GITHUB_TOKEN }}`,
                  'X-GitHub-Api-Version': '2023-11-01'
                },
                body: JSON.stringify({
                  model: 'gpt-4o',
                  messages: [{ role: 'user', content: prompt }],
                  max_tokens: 2048
                })
              });
              
              if (!response.ok) {
                throw new Error(`API error: ${response.status}`);
              }
              
              const result = await response.json();
              const reviewComment = result.choices?.[0]?.message?.content;
              
              if (reviewComment) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body: `## 🤖 AI Code Review\n\n${reviewComment}\n\n---\n*Powered by GitHub Copilot*`
                });
              }
            } catch (error) {
              // Fallback: just post the diff summary
              const lines = diff.split('\n');
              const added = lines.filter(l => l.startsWith('+')).length;
              const removed = lines.filter(l => l.startsWith('-')).length;
              
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `## 📝 PR 變更摘要\n\n- **新增:** ${added} 行\n- **刪除:** ${removed} 行\n\n> AI Review 暫時無法使用，請人工審查。\n\n<details>\n<summary>查看變更內容</summary>\n\n\`\`\`diff\n${diff.substring(0, 3000)}\n\`\`\`\n</details>`
              });
            }
