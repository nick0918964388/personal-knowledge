name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Get PR diff and post summary
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { execSync } = require('child_process');
            
            // Get the diff
            let diff = '';
            try {
              diff = execSync('git diff origin/${{ github.base_ref }}...HEAD -- "*.ts" "*.tsx" "*.js" "*.jsx" "*.css"', { encoding: 'utf8', maxBuffer: 1024 * 1024 });
            } catch (e) {
              console.log('No diff or error getting diff');
              return;
            }
            
            if (!diff.trim()) {
              console.log('No code changes to review');
              return;
            }
            
            // Count changes
            const lines = diff.split('\n');
            const added = lines.filter(l => l.startsWith('+') && !l.startsWith('+++')).length;
            const removed = lines.filter(l => l.startsWith('-') && !l.startsWith('---')).length;
            const files = lines.filter(l => l.startsWith('diff --git')).length;
            
            // Truncate diff for display
            const truncatedDiff = diff.length > 5000 ? diff.substring(0, 5000) + '\n... (truncated)' : diff;
            
            // Post comment
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## 📝 PR 變更摘要

| 項目 | 數量 |
|------|------|
| 📁 變更檔案 | ${files} |
| ➕ 新增行數 | ${added} |
| ➖ 刪除行數 | ${removed} |

<details>
<summary>📄 查看變更內容</summary>

\`\`\`diff
${truncatedDiff}
\`\`\`

</details>

---
*請人工審查後合併*`
            });
